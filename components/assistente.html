<div class="assistente-wrapper">
  <h3 class="assistente-title">🤖 Assistente AIWA</h3>
  <p class="assistente-subtitle">Tire dúvidas rápidas sobre produtos, tecnologias e argumentos de venda.</p>

  <div class="suggestions-box">
    <span class="suggestion-label">Sugestões rápidas:</span>
    <div class="suggestions-list">
      <button class="assistant-suggestion">Como responder objeção de preço?</button>
      <button class="assistant-suggestion">O que é IP66?</button>
      <button class="assistant-suggestion">Como funciona o TWS?</button>
      <button class="assistant-suggestion">Diferença do Bluetooth 5.3</button>
      <button class="assistant-suggestion">Quanto dura a bateria?</button>
      <button class="assistant-suggestion">Como demonstrar o grave?</button>
      <button class="assistant-suggestion">O que é Bass Boost?</button>
      <button class="assistant-suggestion">Como usar o app AIWA?</button>
    </div>
  </div>

  <div class="assistant-chat" id="assistant-chat">
    <div class="assistant-msg bot">
      <p>Olá! Sou o Assistente AIWA. Como posso te ajudar hoje?</p>
    </div>
  </div>

  <div class="assistant-input-box">
    <input type="text" id="assistant-input" placeholder="Digite sua dúvida..." autocomplete="off">
    <button id="assistant-send">➤</button>
  </div>
</div>
